[[plugins]]
repo = 'junegunn/fzf'
build = './install --all'
hook_add = '''
nnoremap [fzf] <Nop>
nmap <Space>f [fzf]
xmap <Space>f [fzf]
nnoremap <silent> [fzf]f     :<C-u>Files<CR>
nnoremap <silent> [fzf]m     :<C-u>Marks<CR>
nnoremap <silent> [fzf]b     :<C-u>Buffers<CR>
nnoremap <silent> [fzf]r     :<C-u>R <CR>
'''

[[plugin]]
repo = 'junegunn/fzf.vim'
